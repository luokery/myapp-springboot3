server:
  port: 5000
  # 优雅停机配置
  shutdown: graceful

spring:
  # 优雅停机超时时间（默认30秒）
  lifecycle:
    timeout-per-shutdown-phase: 30s
  datasource:
    # Druid 数据源配置
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:userdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: 
    druid:
      # 连接池配置
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      # 连接检测配置
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      # 监控配置
      stat-view-servlet:
        enabled: true
        url-pattern: /druid/*
        login-username: admin
        login-password: admin123
        reset-enable: true
      web-stat-filter:
        enabled: true
        url-pattern: /*
        exclusions: "*.js,*.gif,*.jpg,*.png,*.css,*.ico,/druid/*"
      #config是为了数据库加密
      filters: stat,wall,slf4j,log4j2,config
      # spring监控 - 禁用以避免循环依赖
      # aop-patterns: com.example.usermanagement.mapper.*, com.example.usermanagement.service.*, com.example.usermanagement.controller.*
      filter:
        stat:
          enabled: true
          log-slow-sql: true
          merge-sql: true
          slow-sql-millis: 500
        wall:
          enabled: true
          config:
            drop-table-allow: false
            delete-allow: true
            multi-statement-allow: false
        slf4j:
          enabled: false
          statement-create-after-log-enabled: false
          statement-close-after-log-enabled: false
          result-set-open-after-log-enabled: false
          result-set-close-after-log-enabled: false

  h2:
    console:
      enabled: true
      path: /h2
  
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.example.usermanagement.model
  configuration:
    map-underscore-to-camel-case: true

# SpringDoc OpenAPI 配置
springdoc:
  version: '@springdoc.version@'
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  group-configs:
    - group: "all service"
      displayName: 全部服务 API
      paths-to-match: "/**"
      packages-to-scan:
        - com.example.usermanagement.controller
    - group: 'Auth API'
      displayName: 认证管理 API
      paths-to-match: '/api/auth/**'
      packages-to-scan: com.example.usermanagement.controller
    - group: 'Cache API'
      displayName: 缓存管理 API
      paths-to-match: '/api/cache/**'
      packages-to-scan: com.example.usermanagement.controller
    - group: 'User API'
      displayName: 用户管理 API
      paths-to-match: '/api/users/**'
      packages-to-scan: com.example.usermanagement.controller
    - group: 'project API'
      displayName: 项目管理 API
      paths-to-match: '/api/projects/**'
      packages-to-scan: com.example.usermanagement.controller
  # 自定义OpenAPI文档信息
  openapi:
    info:
      title: "测试项目系统API1"  # 文档标题
      description: | # 文档描述
        基于 Spring Boot + MyBatis + MapStruct 的API文档示例 RESTful API 文档
        ## 认证说明
        - 大部分接口需要 JWT Token 认证
        - 请先调用 `/api/auth/login` 或 `/api/auth/register` 获取 Token 
        - 在 Swagger UI 中点击右上角 'Authorize' 按钮，输入 `Bearer <your_token>` 进行认证
      version: "1.0.0"  # 版本号
      contact:  # 联系人信息
        name: "开发团队"
        email: "dev@example.com"
      license: 
        name: MIT License
        url: https://choosealicense.com/licenses/mit/
    servers:  # 接口服务器地址(可选，默认使用当前服务地址)
      - 
        url: "http://localhost:${server.port:8081}" # https://{domain}.localhost.com:{port}/api/{basePath}
        description: "开发环境"
      - 
        url: https://bac27a6b-3c46-4dc1-a6c1-0f6dd5593bd0.dev.coze.site
        description: "生产环境"

        
# Log4j2 日志级别配置
logging:
  level:
    root: INFO
    com.example.usermanagement: DEBUG
    com.alibaba.druid: INFO
    org.springframework.cache: DEBUG
  config: classpath:log4j2.xml

# 文件上传配置
file:
  # 基础上传目录
  upload-dir: /tmp/uploads
  # 公开文件目录（可直接访问）
  public-dir: /tmp/uploads/public
  public-url: /uploads/public
  # 私密文件目录（需要认证）
  private-dir: /tmp/uploads/private
  private-url: /uploads/private
  # 项目图片目录（兼容旧配置）
  project-dir: /tmp/uploads/projects
  project-url: /uploads/projects

# Spring 文件上传配置
spring.servlet.multipart:
  enabled: true
  max-file-size: 10MB
  max-request-size: 20MB

