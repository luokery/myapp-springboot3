server:
  port: 5000

spring:
  datasource:
    # Druid 数据源配置
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:userdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: 
    druid:
      # 连接池配置
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      # 连接检测配置
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      # 监控配置
      stat-view-servlet:
        enabled: true
        url-pattern: /druid/*
        login-username: admin
        login-password: admin123
        reset-enable: true
      web-stat-filter:
        enabled: true
        url-pattern: /*
        exclusions: "*.js,*.gif,*.jpg,*.png,*.css,*.ico,/druid/*"
      #config是为了数据库加密
      filters: stat,wall,slf4j,log4j2,config
      # spring监控 需要引入spring-boot-starter-aop切面支持
      aop-patterns: com.example.usermanagement.mapper.*, com.example.usermanagement.service.*, com.example.usermanagement.controller.*
      filter:
        stat:
          enabled: true
          log-slow-sql: true
          merge-sql: true
          slow-sql-millis: 500
        wall:
          enabled: true
          config:
            drop-table-allow: false
            delete-allow: true
            multi-statement-allow: false
        slf4j:
          enabled: false
          statement-create-after-log-enabled: false
          statement-close-after-log-enabled: false
          result-set-open-after-log-enabled: false
          result-set-close-after-log-enabled: false

  h2:
    console:
      enabled: true
      path: /h2
  
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.example.usermanagement.model
  configuration:
    map-underscore-to-camel-case: true

# SpringDoc OpenAPI 配置
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  group-configs:
    - group: '用户管理 API'
      paths-to-match: '/api/**'
      packages-to-scan: com.example.usermanagement.controller

# Log4j2 日志级别配置
logging:
  level:
    root: INFO
    com.example.usermanagement: DEBUG
    com.alibaba.druid: INFO
    org.springframework.cache: DEBUG
  config: classpath:log4j2.xml

# 文件上传配置
file:
  upload-dir: c:/tmp/uploads/projects

# Spring 文件上传配置
spring.servlet.multipart:
  enabled: true
  max-file-size: 10MB
  max-request-size: 20MB

